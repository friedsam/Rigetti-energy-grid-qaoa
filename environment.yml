name: energy-grid-qaoa
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - numpy
  - scipy
  - pandas
  - matplotlib
  - networkx
  - jupyterlab
  - ipykernel
  - pyarrow
  - pytest
  - pip:
      # Community detection (Louvain)
      - python-louvain
      # Rigetti SDK (quantum part)
      - pyquil
      # QAOA circuit and statevector simulation
      - qiskit
      # Optional (error mitigation)
      - mitiq
      # Optional helpers
      - tqdm
